name: focus_my_time
description: "FocusMyTime - 番茄工作法 + 单核工作法计时器"
publish_to: 'none'
version: 1.0.15+15

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.5.0

  # 数据库
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.0

  # 导航
  go_router: ^12.0.0

  # 通知
  flutter_local_notifications: ^16.0.0

  # 音频
  audioplayers: ^5.0.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 网络（云同步）
  http: ^1.1.0

  # UUID
  uuid: ^4.2.0

  # intl 日期格式化
  intl: ^0.19.0
  google_fonts: ^6.0.0
  windows_notification: ^1.3.0
  timezone: ^0.9.2
  flutter_timezone: ^4.1.1
  permission_handler: ^11.0.0
  device_calendar: ^4.3.2
  package_info_plus: ^5.0.0
  file_picker: ^8.0.0
  encrypt: ^5.0.3
  url_launcher: ^6.3.1
  sqlite3_flutter_libs: ^0.5.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
