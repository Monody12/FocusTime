name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送带有 v 前缀的 tag 时触发，例如 v1.0.13
  workflow_dispatch:
    inputs:
      version:
        description: '发布的版本号 (例如: v1.0.13)'
        required: true
        default: 'v1.0.13'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows 平台
          - os: windows-2019
            platform: windows
            build_cmd: flutter build windows --release
            asset_name: FocusMyTime-Windows-Setup.exe
          # Android 平台
          - os: ubuntu-latest
            platform: android
            build_cmd: flutter build apk --release
            asset_path: build/app/outputs/flutter-apk/app-release.apk
            asset_name: FocusMyTime-Android.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Application
        run: ${{ matrix.build_cmd }}

      # 针对 Windows：使用 Inno Setup 打包为安装程序
      - name: Build Windows Installer
        if: matrix.platform == 'windows'
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\inno_setup.iss'

      # 针对 Android：重命名 APK 文件以便于发布
      - name: Rename APK
        if: matrix.platform == 'android'
        run: mv ${{ matrix.asset_path }} ${{ matrix.asset_name }}

      # 上传到 GitHub Releases
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
