name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布的版本号，例如 v1.0.15'
        required: true
        default: 'v1.0.15'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            artifactName: FocusMyTime-Windows-Setup
            artifactPath: FocusMyTime-Windows-Setup.exe
          - os: ubuntu-latest
            platform: android
            artifactName: FocusMyTime-Android
            artifactPath: FocusMyTime-Android.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        if: matrix.platform == 'windows'
        run: flutter config --enable-windows-desktop

      - name: Build Windows application
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\inno_setup.iss'

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Rename Android APK
        if: matrix.platform == 'android'
        run: mv build/app/outputs/flutter-apk/app-release.apk FocusMyTime-Android.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
